services:
  mongodb:
    image: mongo:6.0
    container_name: startuptech-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build: .
    container_name: startuptech-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=much_todo_db
      - JWT_SECRET_KEY=your-super-secret-key-change-in-production
      - JWT_EXPIRATION_HOURS=72
      - ENABLE_CACHE=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge